<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Heart Disease Risk Prediction</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="home-bg">


<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">

        <a class="navbar-brand text-decoration-none" href="/">

            <img src="{{ url_for('static', filename='images/logo.png') }}"
                 alt="Logo"
                 class="logo-img">

            <div>
                <div class="app-title">
                    Heart Disease Risk Prediction
                </div>

                <div class="tagline">
                    Early Detection, Better Prevention
                </div>
            </div>

        </a>

        <div class="nav-text d-none d-md-block">
            ❤️ Your Health, Our Priority
        </div>

    </div>
</nav>


<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="card shadow-sm">
                <div class="card-body p-4">

                    <h4 class="mb-3">Patient Information</h4>

                    <form action="/predict" method="POST">

                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Patient Name</label>
                            <input type="text" name="patient_name" class="form-control" placeholder="Enter patient name" required>
                        </div>

                        <hr>

                        <h5 class="mb-3">Medical Details</h5>

                        <div class="row g-3">

                            
                            <div class="col-md-6">
                                <label class="form-label">Age</label>
                                <input type="number" name="age" class="form-control" required>
                            </div>

                            
                            <div class="col-md-6">
                                <label class="form-label">Gender</label>
                                <select name="gender" class="form-select" required>
                                    <option value="">Select</option>
                                    <option value="1">Male</option>
                                    <option value="0">Female</option>
                                </select>
                            </div>

                           
                            <div class="col-md-6">
                                <label class="form-label">Systolic BP (mmHg)</label>
                                <input type="number" name="systolic_bp" class="form-control"
                                       min="90" max="180"
                                       placeholder="90 - 180 mmHg"
                                       title="Enter between 90 and 180" required>
                                <small class="hint">Range: 90–180 mmHg</small>
                            </div>

                           
                            <div class="col-md-6">
                                <label class="form-label">Diastolic BP (mmHg)</label>
                                <input type="number" name="diastolic_bp" class="form-control"
                                       min="60" max="120"
                                       placeholder="60 - 120 mmHg"
                                       title="Enter between 60 and 120" required>
                                <small class="hint">Range: 60–120 mmHg</small>
                            </div>

                            >
                            <div class="col-md-6">
                                <label class="form-label">Cholesterol (mg/dL)</label>
                                <input type="number" name="cholesterol" class="form-control"
                                       min="120" max="350"
                                       placeholder="120 - 350 mg/dL"
                                       title="Enter between 120 and 350" required>
                                <small class="hint">Range: 120–350 mg/dL</small>
                            </div>

                            
                            <div class="col-md-6">
                                <label class="form-label">Diabetes</label>
                                <select name="diabetes" class="form-select" required>
                                    <option value="">Select</option>
                                    <option value="1">Yes</option>
                                    <option value="0">No</option>
                                </select>
                            </div>

                            
                            <div class="col-md-6">
                                <label class="form-label">Smoker</label>
                                <select name="smoker" class="form-select" required>
                                    <option value="">Select</option>
                                    <option value="1">Yes</option>
                                    <option value="0">No</option>
                                </select>
                            </div>

                            
                            <div class="col-md-6">
                                <label class="form-label">Physical Activity</label>
                                <select name="physical_activity" class="form-select" required>
                                    <option value="">Select</option>
                                    <option value="0">Low</option>
                                    <option value="1">Moderate</option>
                                    <option value="2">High</option>
                                </select>
                            </div>

                            
                            <div class="col-md-6">
                                <label class="form-label">Family History</label>
                                <select name="family_history" class="form-select" required>
                                    <option value="">Select</option>
                                    <option value="1">Yes</option>
                                    <option value="0">No</option>
                                </select>
                            </div>

                        </div>

                        <div class="mt-4 text-center">
                            <button type="submit" class="btn btn-primary btn-lg px-5">
                                Predict Risk
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>


<footer class="text-center text-muted py-3">
    <small>Heart Disease Risk Prediction</small>
</footer>

</body>
</html>
